<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XenoFlac — Hi-Fi Music</title>
    <meta name="description" content="Search and stream high-fidelity music across all providers.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="app-container">

        <!-- ── HEADER ── -->
        <header class="app-header">
            <h1 class="logo">Xeno<span>flac</span></h1>
            <p class="tagline">All providers. One search.</p>
        </header>

        <!-- ── SEARCH BAR ── -->
        <section class="search-section glass-panel">
            <form id="search-form" class="search-form" autocomplete="off">
                <div class="search-input-wrap">
                    <i class="fas fa-search search-icon"></i>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search tracks, artists, albums…"
                        required
                        autofocus
                    >
                    <button type="submit" id="search-btn" class="btn-search">
                        <i class="fas fa-search"></i>
                        <span>Search</span>
                    </button>
                </div>
                <div class="provider-badges" id="provider-badges">
                    <!-- Injected by JS: 💿 Qobuz  🎧 Deezer  🌊 Tidal  📦 Amazon  📻 Pandora -->
                </div>
            </form>
        </section>

        <!-- ── LOCAL LIBRARY ── -->
        <section id="library-section" class="library-section glass-panel">
            <div class="library-header">
                <div>
                    <h2 class="section-title compact">Downloaded Music</h2>
                    <p class="library-subtitle">Tracks saved to this device.</p>
                </div>
                <button id="refresh-library-btn" class="btn-ghost" type="button">
                    <i class="fas fa-rotate"></i> Refresh
                </button>
            </div>
            <div id="library-list" class="library-list hidden"></div>
        </section>

        <!-- ── SEARCH RESULTS ── -->
        <section id="results-section" class="results-section hidden">
            <!-- spinner -->
            <div id="loading-spinner" class="spinner hidden">
                <div class="bounce1"></div><div class="bounce2"></div><div class="bounce3"></div>
            </div>
            <!-- result count -->
            <div id="results-header" class="results-header hidden">
                <h2 class="section-title">Results</h2>
                <span id="results-meta" class="results-meta"></span>
            </div>
            <!-- grid -->
            <div id="results-grid" class="results-grid"></div>
        </section>

    </main>

    <!-- ═══════════════════════════════════════════════
         DOWNLOAD MODAL
         Steps:
           1. stream-step  — try Qobuz stream
           2. provider-step — pick download provider
           3. quality-step  — pick quality
           4. progress-step — downloading
           5. done-step     — finished
    ═══════════════════════════════════════════════ -->
    <div id="dl-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="dl-modal-title">
        <div class="modal-content glass-panel">
            <button id="dl-close" class="close-btn" aria-label="Close"><i class="fas fa-times"></i></button>

            <!-- Track info header -->
            <div class="modal-header">
                <img id="dl-cover" src="" alt="" class="modal-cover hidden">
                <div class="modal-info">
                    <h3 id="dl-modal-title" class="modal-title">Track Title</h3>
                    <p id="dl-modal-artist" class="modal-artist">Artist</p>
                    <p id="dl-modal-meta" class="modal-track-meta"></p>
                </div>
            </div>

            <div class="modal-body">

                <!-- STEP 1: streaming failed notice (hidden until needed) -->
                <div id="stream-failed-notice" class="stream-failed-notice hidden">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="stream-failed-msg">Streaming via Qobuz tidak tersedia.</span>
                </div>

                <!-- STEP 2: provider picker -->
                <div id="provider-step" class="modal-step hidden">
                    <p class="step-label"><i class="fas fa-music"></i> Pilih provider download:</p>
                    <div id="provider-picker" class="provider-picker"></div>
                </div>

                <!-- STEP 3: quality picker -->
                <div id="quality-step" class="modal-step hidden">
                    <p class="step-label"><i class="fas fa-sliders-h"></i> Pilih kualitas audio:</p>
                    <div id="quality-picker" class="quality-picker"></div>
                    <button id="start-download-btn" class="btn-primary full-width" disabled>
                        <i class="fas fa-download"></i> Download
                    </button>
                </div>

                <!-- STEP 4: progress -->
                <div id="progress-step" class="modal-step hidden">
                    <div class="progress-info">
                        <span id="dl-status">Downloading…</span>
                        <span id="dl-pct">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="dl-bar" class="progress-bar-fill"></div>
                    </div>
                </div>

                <!-- STEP 5: done -->
                <div id="done-step" class="modal-step hidden">
                    <div class="done-banner">
                        <i class="fas fa-check-circle done-icon"></i>
                        <p>Download selesai!</p>
                    </div>
                    <div class="done-actions">
                        <button id="play-now-btn" class="btn-primary" type="button">
                            <i class="fas fa-play"></i> Play Now
                        </button>
                        <a id="save-file-link" href="#" class="btn-ghost" download>
                            <i class="fas fa-save"></i> Simpan File
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════
         BOTTOM PLAYER
    ═══════════════════════════════════════════════ -->
    <div id="music-player" class="music-player glass-panel hidden">
        <img id="player-cover" class="player-cover hidden" src="" alt="">
        <div class="player-meta">
            <div id="player-title" class="player-title">Nothing playing</div>
            <div id="player-artist" class="player-artist">—</div>
        </div>
        <audio id="player-audio" controls preload="metadata"></audio>
        <a id="player-download" class="player-btn" href="#" download title="Save file">
            <i class="fas fa-download"></i>
        </a>
        <button id="player-close" class="player-btn" type="button" title="Close player">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
